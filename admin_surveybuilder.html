<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Builder Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
	
	<style>
	.topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; z-index: 100; }
    .logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark svg { width: 16px; height: 16px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--text-1); }
    .logo-text span { color: var(--accent); }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2); margin-left: 8px; }
    .breadcrumb-sep { color: var(--text-3); }
    .breadcrumb-current { color: var(--text-1); font-weight: 500; }
    .survey-title-input { flex: 1; text-align: center; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-1); border: none; background: transparent; outline: none; padding: 4px 12px; border-radius: 6px; transition: background 0.15s; cursor: pointer; }
    .survey-title-input:hover { background: var(--bg); }
    .survey-title-input:focus { background: var(--bg); cursor: text; }
    .top-tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 3px; }
    .top-tab { padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; transition: all 0.15s; user-select: none; }
    .top-tab.active { background: var(--surface); color: var(--text-1); box-shadow: var(--shadow-sm); }
    .top-tab:hover:not(.active) { color: var(--text-1); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: black; }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(26,86,219,0.3); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text-1); }
    .save-indicator { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 5px; transition: opacity 0.4s; }
    </style>
</head>
<body>
<header class="topbar">

  <span class="logo-text">CASE </span>
  <div class="breadcrumb">
    <span>Projects</span><span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current" id="bc-title">Untitled Survey</span>
  </div>
  <input class="survey-title-input" id="survey-title" value="Untitled Survey" oninput="syncTitle(this.value)"/>
  <div class="top-tabs">
    
  </div>

	  <button class="btn btn-primary" onclick="openPreview()">
		
	
		<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
		  <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" 
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
		  <path d="M10.3 21C10.7239 21.3921 11.2743 21.6045 11.8412 21.5947C12.4081 21.5849 12.9431 21.3537 13.3392 20.9475" 
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
		</svg>

	  </button>
	  
	  	<button class="btn btn-primary" onclick="openPreview()">
		
	

		<svg width="24" height="24" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
		  <circle cx="32" cy="32" r="32" fill="#0056D2"/>
		  
		  <path d="M42 22V36C42 41.5228 37.5228 46 32 46C26.4772 46 22 41.5228 22 36V22" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
		</svg>

	  </button>  
</header>
    <div class="top-nav">
        <div class="nav-links">
            <a href="admin_surveybuilder.html" class="active" style="margin-left: 10px;">Survey</a>
            <a href="distribution.html">Distributions</a>
            <a href="dataanalysis.html">Data & Analysis</a>
            <a href="results.html">Results</a>
        </div>
        <button class="btn-publish">Publish</button>
        <!-- NEW DRAFT CONTROLS -->
         <div style="display: flex; align-items: center; gap: 10px; margin-right: 15px;">
            <select id="draft-selector" class="form-select" onchange="loadDraft(this.value)" style="padding: 5px; max-width: 200px;">
                <option value="">-- Select a Draft --</option>
            </select>
            <button onclick="createNewDraft()" style="padding: 5px 10px; cursor: pointer;">+ New</button>
            <button class="btn-publish" onclick="saveDraft()">Save Draft</button>
        </div>
    </div>
    </div>

    <div class="dashboard-container">
        
        <div class="sidebar">
            <div class="sidebar-header">Edit question</div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">Question type</div>
                <select id="q-type-selector" class="form-select" disabled onchange="changeQuestionType(this.value)">
                    <option value="mcq">Multiple choice</option>
                    <option value="image_mcq">Image choice (Blocks)</option>
                    <option value="spatial">Arrow move (Spatial)</option>
					<option value="text_entry">Text entry </option>
					<option value="yes_no">Yes No</option>
                </select>
            </div>

            <div class="sidebar-section" id="choices-section" style="opacity: 0.5;">
                <div class="sidebar-label">Answer type</div>
                <div style="font-size: 13px; color: #374151; margin-bottom: 12px; display: flex; align-items: center;">
                    <input type="radio" name="ans_type" id="ans_single" value="single" disabled onchange="changeAnswerType('single')" style="margin-right: 8px;"> 
                    <label for="ans_single">Allow one answer</label>
                </div>
                <div style="font-size: 13px; color: #374151; margin-bottom: 12px; display: flex; align-items: center;">
                    <input type="radio" name="ans_type" id="ans_multiple" value="multiple" disabled onchange="changeAnswerType('multiple')" style="margin-right: 8px;"> 
                    <label for="ans_multiple">Allow multiple answers</label>
                </div>
            </div>

            <div class="sidebar-section" style="border-top: 1px solid #e5e7eb; padding-top: 15px;">
                <div class="sidebar-label">Survey Settings</div>
                <div style="font-size: 13px; color: #374151; margin-bottom: 8px; display: flex; align-items: center;">
                    <input type="checkbox" id="enable-timer" onchange="toggleTimer()" style="margin-right: 8px;">
                    <label for="enable-timer">Enable universal timer</label>
                </div>
                <div id="timer-config" style="display: none; margin-left: 20px;">
                    <input type="number" id="timer-minutes" min="1" placeholder="Mins" oninput="updateTimerValue()" style="width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
                    <span style="font-size: 13px; color: #374151;"> minutes</span>
                </div>
            </div>

            <div class="sidebar-section">
                <button id="btn-delete" class="btn-danger" disabled onclick="deleteSelectedQuestion()">
                    Delete Question
                </button>
            </div>
        </div>

        <div class="workspace">
            <div class="survey-canvas">
                <input type="text" id="main-survey-title" class="survey-title-input" placeholder="Untitled project" value="Student Semester 1 Quiz">
                
                <div id="questions-container"></div>

                <div style="margin-top: 24px; display: flex; justify-content: flex-end;">
                    <button class="btn-add-question" onclick="addQuestion()">
                        <span style="font-size: 18px;">+</span> Add new question
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentSurveyId = Date.now();

        // 1. Save the current workspace
        function saveDraft() {
            const title = document.getElementById('main-survey-title').value;
            let drafts = JSON.parse(localStorage.getItem('surveyDrafts')) || [];

            // Package everything up (including our new timer settings!)
            const surveyData = {
                id: currentSurveyId,
                title: title,
                questions: questions,
                settings: surveySettings 
            };

            // Update existing draft, or add as a new one
            const existingIndex = drafts.findIndex(d => d.id === currentSurveyId);
            if (existingIndex >= 0) {
                drafts[existingIndex] = surveyData;
            } else {
                drafts.push(surveyData);
            }

            localStorage.setItem('surveyDrafts', JSON.stringify(drafts));
            updateDraftDropdown(); // Refresh the menu
            alert(`Draft "${title}" saved!`);
        }

        // 2. Populate the Dropdown Menu
        function updateDraftDropdown() {
            const drafts = JSON.parse(localStorage.getItem('surveyDrafts')) || [];
            const selector = document.getElementById('draft-selector');
            
            selector.innerHTML = '<option value="">-- Select a Draft --</option>';
            
            drafts.forEach(draft => {
                const opt = document.createElement('option');
                opt.value = draft.id;
                opt.textContent = draft.title || "Untitled project";
                if (draft.id === currentSurveyId) opt.selected = true;
                selector.appendChild(opt);
            });
        }

        // 3. Load a draft when selected from the dropdown
        function loadDraft(id) {
            if (!id) return;
            const drafts = JSON.parse(localStorage.getItem('surveyDrafts')) || [];
            const found = drafts.find(d => d.id.toString() === id.toString());

            if (found) {
                currentSurveyId = found.id;
                document.getElementById('main-survey-title').value = found.title;
                questions = found.questions || [];
                
                // Restore the timer settings visually in the sidebar
                surveySettings = found.settings || { hasTimer: false, timeLimitMinutes: 0 };
                document.getElementById('enable-timer').checked = surveySettings.hasTimer;
                document.getElementById('timer-config').style.display = surveySettings.hasTimer ? 'block' : 'none';
                document.getElementById('timer-minutes').value = surveySettings.timeLimitMinutes || '';

                activeQuestionId = null; 
                renderQuestions();
                setActive(null); // Gray out the sidebar until they click a question
            }
        }

        // 4. Wipe the slate clean for a new survey
        function createNewDraft() {
            currentSurveyId = Date.now();
            document.getElementById('main-survey-title').value = "Untitled project";
            questions = [];
            
            // Reset timer UI
            surveySettings = { hasTimer: false, timeLimitMinutes: 0 };
            document.getElementById('enable-timer').checked = false;
            document.getElementById('timer-config').style.display = 'none';
            document.getElementById('timer-minutes').value = '';

            addQuestion(); // Give them one blank question
            updateDraftDropdown();
        }
        let activeQuestionId = null;

        // Store the global survey settings
        let surveySettings = {
            hasTimer: false,
            timeLimitMinutes: 0
        };

        // NEW: Functions to handle the timer inputs
        function toggleTimer() {
            const isChecked = document.getElementById('enable-timer').checked;
            surveySettings.hasTimer = isChecked;
            
            // Show or hide the minutes input box
            document.getElementById('timer-config').style.display = isChecked ? 'block' : 'none';
            
            // If they uncheck it, reset the time to 0
            if (!isChecked) {
                document.getElementById('timer-minutes').value = '';
                surveySettings.timeLimitMinutes = 0;
            }
        }

        function updateTimerValue() {
            const mins = document.getElementById('timer-minutes').value;
            surveySettings.timeLimitMinutes = parseInt(mins) || 0;
        }

        function addQuestion() {
            const newId = Date.now();
            questions.push({
                id: newId,
                type: 'mcq', 
                answerType: 'single', // 'single' or 'multiple'
                title: 'Click to write the question text'
            });
            setActive(newId);
        }

        function setActive(id) {
            // Only re-render if the active ID actually changes.
            // This prevents losing focus when clicking inside an already active block.
            if (activeQuestionId !== id) {
                activeQuestionId = id;
                renderQuestions();
            }
            
            // Update sidebar state regardless
            const selector = document.getElementById('q-type-selector');
            const deleteBtn = document.getElementById('btn-delete');
            const choicesSec = document.getElementById('choices-section');
            const ansSingle = document.getElementById('ans_single');
            const ansMultiple = document.getElementById('ans_multiple');
            
            if(id) {
                const q = questions.find(q => q.id === id);
                selector.value = q.type;
                selector.disabled = false;
                deleteBtn.disabled = false;
                
                // Show/enable answer types for MCQ and Image Choice
                if (q.type === 'mcq' || q.type === 'image_mcq') {
                    choicesSec.style.opacity = '1';
                    ansSingle.disabled = false;
                    ansMultiple.disabled = false;
                    ansSingle.checked = (q.answerType === 'single');
                    ansMultiple.checked = (q.answerType === 'multiple');
                } else {
                    choicesSec.style.opacity = '0.5';
                    ansSingle.disabled = true;
                    ansMultiple.disabled = true;
                }
            } else {
                selector.disabled = true;
                deleteBtn.disabled = true;
                choicesSec.style.opacity = '0.5';
                ansSingle.disabled = true;
                ansMultiple.disabled = true;
            }
        }

        function changeQuestionType(newType) {
            if(!activeQuestionId) return;
            const q = questions.find(q => q.id === activeQuestionId);
            q.type = newType;
            activeQuestionId = null; // force re-render
            setActive(q.id);
        }

        function changeAnswerType(ansType) {
            if(!activeQuestionId) return;
            const q = questions.find(q => q.id === activeQuestionId);
            q.answerType = ansType;
            activeQuestionId = null; // force re-render
            setActive(q.id);
        }

        function deleteSelectedQuestion() {
            if(!activeQuestionId) return;
            questions = questions.filter(q => q.id !== activeQuestionId);
            setActive(null);
            renderQuestions();
        }

        function triggerImageUpload(event, qId, key, imgId, placeholderId) {
            event.stopPropagation(); 
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        const dataUrl = e.target.result;
                        
                        // Save the image data to our array
                        const q = questions.find(q => q.id === qId);
                        if (!q.images) q.images = {}; // Create an images object if it doesn't exist
                        q.images[key] = dataUrl;      // Save it using the specific key (e.g., 'target', 'opt1')

                        // Update the DOM immediately
                        document.getElementById(imgId).src = dataUrl;
                        document.getElementById(imgId).style.display = 'block';
                        document.getElementById(placeholderId).style.display = 'none';
                    }
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const block = document.createElement('div');
                block.className = `question-block ${q.id === activeQuestionId ? 'active' : ''}`;
                // Set active when clicking the block
                block.onclick = () => setActive(q.id);

                let innerHTML = `
                    <div class="q-header">
                        <div class="q-number">Q${index + 1}</div>
                        <textarea class="q-title-input" rows="2" oninput="updateTitle(${q.id}, this.value)" onclick="event.stopPropagation()">${q.title}</textarea>
                    </div>
                `;

                // Determine input type based on Answer Type selection
                const inputType = q.answerType === 'multiple' ? 'checkbox' : 'radio';

                if (q.type === 'mcq') {
                    // Pull saved options, or use defaults if they haven't typed anything yet
                    const opts = q.options || [
                        'Click to write Choice 1', 
                        'Click to write Choice 2', 
                        'Click to write Choice 3'
                    ];

                    innerHTML += `
                        <div class="mcq-option">
                            <input type="${inputType}" disabled> 
                            <input type="text" value="${opts[0]}" oninput="updateOptionText(${q.id}, 0, this.value)" onclick="event.stopPropagation()">
                        </div>
                        <div class="mcq-option">
                            <input type="${inputType}" disabled> 
                            <input type="text" value="${opts[1]}" oninput="updateOptionText(${q.id}, 1, this.value)" onclick="event.stopPropagation()">
                        </div>
                        <div class="mcq-option">
                            <input type="${inputType}" disabled> 
                            <input type="text" value="${opts[2]}" oninput="updateOptionText(${q.id}, 2, this.value)" onclick="event.stopPropagation()">
                        </div>
                    `;
                } else if (q.type === 'image_mcq') {
                    // Helper function to render image boxes cleanly
                    const renderImageBox = (key, imgId, phId, phText) => {
                        const hasImage = q.images && q.images[key];
                        const imgSrc = hasImage ? q.images[key] : '';
                        const imgDisplay = hasImage ? 'block' : 'none';
                        const phDisplay = hasImage ? 'none' : 'block';

                        return `
                            <div class="image-upload-box" onclick="triggerImageUpload(event, ${q.id}, '${key}', '${imgId}', '${phId}')">
                                <div id="${phId}" style="display: ${phDisplay};">${phText}</div>
                                <img id="${imgId}" src="${imgSrc}" style="display: ${imgDisplay}; max-width: 100%; max-height: 100%;">
                            </div>
                        `;
                    };

                    innerHTML += `
                        <div class="image-mcq-container">
                            <div class="image-mcq-target">
                                ${renderImageBox('target', `img_tgt_${q.id}`, `ph_tgt_${q.id}`, '+ Target Object')}
                            </div>
                            
                            <div class="image-mcq-options">
                                <div class="image-mcq-opt-wrapper">
                                    ${renderImageBox('opt1', `img1_${q.id}`, `ph1_${q.id}`, '+ Option')}
                                    <input type="${inputType}" class="opt-selector" disabled>
                                </div>
                                <div class="image-mcq-opt-wrapper">
                                    ${renderImageBox('opt2', `img2_${q.id}`, `ph2_${q.id}`, '+ Option')}
                                    <input type="${inputType}" class="opt-selector" disabled>
                                </div>
                                <div class="image-mcq-opt-wrapper">
                                    ${renderImageBox('opt3', `img3_${q.id}`, `ph3_${q.id}`, '+ Option')}
                                    <input type="${inputType}" class="opt-selector" disabled>
                                </div>
                                <div class="image-mcq-opt-wrapper">
                                    ${renderImageBox('opt4', `img4_${q.id}`, `ph4_${q.id}`, '+ Option')}
                                    <input type="${inputType}" class="opt-selector" disabled>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (q.type === 'spatial') {
                    const hasImage = q.images && q.images['spatial'];
                    const imgSrc = hasImage ? q.images['spatial'] : '';
                    const imgDisplay = hasImage ? 'block' : 'none';
                    const phDisplay = hasImage ? 'none' : 'block';

                    innerHTML += `
                        <div class="spatial-placeholder">
                            <div class="spatial-left" onclick="triggerImageUpload(event, ${q.id}, 'spatial', 'img_sp_${q.id}', 'ph_sp_${q.id}')">
                                <div id="ph_sp_${q.id}" style="display: ${phDisplay};">+ Import Question Image</div>
                                <img id="img_sp_${q.id}" src="${imgSrc}" style="max-width:100%; max-height:100%; display:${imgDisplay};">
                            </div>
                            <div class="spatial-right"><div class="circle-mockup"><div class="arrow-mockup"></div></div></div>
                        </div>
                    `;
                } else if (q.type ==='text_entry')
				
				{
				innerHTML += `
				
				  <div class="text-entry-container">
				<textarea 
					class="text_entry_container" 
					rows="4" 
					placeholder="Student will type their answer here…" 
					disabled
					onclick="event.stopPropagation()"
					style="width:100%; resize:vertical; border:1px solid #d1d5db; border-radius:6px; font-size:14px; color:#9ca3af;">
				</textarea>
        </div>
    `;
				}
				
				else if (q.type ==='text_entry')
				
				{
				innerHTML += `
				
				  <div class="text-entry-container">
				<textarea 
					class="text_entry_container" 
					rows="4" 
					placeholder="Student will type their answer here…" 
					disabled
					onclick="event.stopPropagation()"
					style="width:100%; resize:vertical; border:1px solid #d1d5db; border-radius:6px; font-size:14px; color:#9ca3af;">
				</textarea>
        </div>
    `;
				} 
				else if (q.type ==='yes_no')
				
				{
				
				// Pull saved options, or use defaults if they haven't typed anything yet
                    const opts = q.options || [
                        'Yes', 
                        'No', 
                        
                    ];
				
			

                    innerHTML += `
                        <div class="mcq-option">
                            <input type="${inputType}" disabled> 
                            <input type="text" value="${opts[0]}" oninput="updateOptionText(${q.id}, 0, this.value)" onclick="event.stopPropagation()">
                        </div>
                        <div class="mcq-option">
                            <input type="${inputType}" disabled> 
                            <input type="text" value="${opts[1]}" oninput="updateOptionText(${q.id}, 1, this.value)" onclick="event.stopPropagation()">
                        </div>
                       
    `;
				}
                
                // ADD THESE TWO LINES HERE:
                block.innerHTML = innerHTML;
                container.appendChild(block);
            });
        }



        function updateTitle(id, newTitle) {
            const q = questions.find(q => q.id === id);
            q.title = newTitle;
        }

        function updateOptionText(id, optionIndex, newText) {
            const q = questions.find(q => q.id === id);
            
            // If the options array doesn't exist yet, create it with defaults
            if (!q.options) {
                q.options = [
                    'Click to write Choice 1', 
                    'Click to write Choice 2', 
                    'Click to write Choice 3'
                ];
            }
            
            // Update the specific option's text
            q.options[optionIndex] = newText;
        }

        // Initialize empty but ready
        
        addQuestion();
    </script>
</body>
</html>
