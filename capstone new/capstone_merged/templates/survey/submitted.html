<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey Submitted</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="submit-container">
    <div class="submit-card">
        <div class="checkmark">✔</div>
        <div class="title">Your response has been recorded</div>
        <p class="subtitle">Thank you for completing the survey.<br>You may now close this page.</p>
        <button id="btnRestart" class="btn btn-secondary" style="margin-top: 14px;">Start another survey</button>
    </div>
</div>
<script src="/app-config.js"></script>
<script src="/static/js/survey_runtime.js"></script>
<script>
  document.getElementById('btnRestart').addEventListener('click', () => {
    const state = SurveyRuntime.getState() || {};
    const token = SurveyRuntime.getTokenFromUrl() || state.token || '';
    SurveyRuntime.clearState();
    if (token) {
      window.location.href = `/survey/${encodeURIComponent(token)}`;
      return;
    }
    window.location.href = '/survey/consent';
  });
</script>
</body>
</html>
