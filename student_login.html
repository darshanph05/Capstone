<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
	  overflow-x: hidden;
    }
	
	
	body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  
  /* The Image */
  background-image: url('Background 1.jpg');
  background-size: cover;
  background-position: center;
  
  /* The Blur Effect */
  filter: blur(8px);
  
  /* Move it behind the content */
  z-index: -1;
  
  /* Optional: Zoom in slightly to hide the white blurred edges */
  transform: scale(1.1);
}

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .entry-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      padding: 36px;
    }

    .entry-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .entry-subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    .form-label {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.2rem rgba(79,70,229,0.12);
    }

    .btn-continue {
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
    }

    .btn-continue:hover {
      background: #4338ca;
    }

    .helper-text {
      font-size: 0.88rem;
      color: #6b7280;
      margin-top: 18px;
      text-align: center;
    }

    .required {
      color: #dc2626;
    }
	
	.custom-header {
  
	  display: flex;
	  justify-content: space-between; /* Pushes content to the ends */
	  align-items: center;           /* Centers text vertically */
	  
	  /* Dimensions */
	  height: 100px;
	  padding: 0 15px;               /* Adds a little breathing room on the sides */
	  
	  /* Styling */
	  background-color: #333;
	  color: white;
	  font-size: 20px;               /* Small font for a small header */
	}
  </style>
</head>
<body>

	<header class ="custom-header">
		<span>CASE Central for Advanced Study in Education</span>
		<span>Semester 1 quiz</span>
	
	</header>
  <div class="page-wrap">
    <div class="entry-card">
      <div class="entry-title">Student Entry</div>
      <div class="entry-subtitle">
        Please enter your details to continue to the instructions page.
      </div>

      <form action="/instructions" method="GET">
        <div class="mb-3">
          <label for="studentName" class="form-label">Full Name <span class="required">*</span></label>
          <input
            type="text"
            id="studentName"
            name="student_name"
            class="form-control"
            placeholder="Enter your full name"
            required
          >
        </div>

        <div class="mb-3">
          <label for="studentEmail" class="form-label">School  <span class="required">*</span></label>
          <input
            type="email"
            id="studentEmail"
            name="school_email"
            class="form-control"
            placeholder="Enter your school name"
            required
          >
        </div>
		
		 <div class="mb-4">
          <label for="studentGrade" class="form-label">Grade <span class="required">*</span></label>
          <select id="studentGrade" name="grade" class="form-select" required>
            <option value="" selected disabled>Select your grade</option>
            <option value="Grade 7">Grade 7</option>
            <option value="Grade 8">Grade 8</option>
            <option value="Grade 9">Grade 9</option>
            <option value="Grade 10">Grade 10</option>
          </select>
        </div>
		
		<div class="mb-3">
          <label for="studentEmail" class="form-label">Date of birth <span class="required">*</span></label>
          <input
            type="Date"
            id="studentEmail"
            name="school_email"
            class="form-control"
            placeholder="DD/MM/YYYY"
            required
          >
        </div>

       

        <div class="d-grid">
		<!-- <a href ="instructions.html"> -->
          <!-- <button type="submit" class="btn btn-primary btn-continue">Continue</button> -->
		<!-- </a> -->
		
		<button class="btn btn-primary btn-continue" onclick="window.location.href='instructions.html';">
			Go to Next Page
		</button>
        </div>
      </form>

      <div class="helper-text">
        Make sure your details are correct before continuing.
      </div>
    </div>
  </div>
</body>
</html>
