<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
      #school[readonly] {
        background-color: #e9ecef;
        color: #495057;
        cursor: not-allowed;
      }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="entry-card">
            <div class="entry-title">Student Details</div>
            <div class="entry-subtitle" id="surveyName">Please enter your information to begin the assessment.</div>
            <form id="details-form">
              <div class="mb-3" id="field-code-wrap">
                <label class="form-label" id="label-code">Participant Code <span class="required" id="required-code">*</span></label>
                    <input type="text" id="code" class="form-control" placeholder="Enter your code" required>
                </div>
              <div class="mb-3" id="field-name-wrap">
                <label class="form-label" id="label-name">Full Name <span class="required" id="required-name">*</span></label>
                    <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
                </div>
              <div class="mb-3" id="field-dob-wrap">
                <label class="form-label" id="label-dob">Date of Birth <span class="required" id="required-dob">*</span></label>
                    <input type="date" id="dob" class="form-control" required>
                </div>
              <div class="mb-3" id="field-grade-wrap">
                <label class="form-label" id="label-grade">Grade <span class="required" id="required-grade">*</span></label>
                    <select id="grade" class="form-select" required>
                        <option value="" selected disabled>Select your grade</option>
                        <option value="Grade 7">Grade 7</option>
                        <option value="Grade 8">Grade 8</option>
                        <option value="Grade 9">Grade 9</option>
                        <option value="Grade 10">Grade 10</option>
                    </select>
                </div>
              <div class="mb-4" id="field-school-wrap">
                <label class="form-label" id="label-school">School <span class="required" id="required-school">*</span></label>
                <input type="text" id="school" class="form-control" value="Ambience Partner School" readonly required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-continue" style="margin-top: 0;">Continue to Instructions</button>
                </div>
                <div id="msg" class="msg err" style="margin-top:10px;"></div>
            </form>
        </div>
    </div>

    <script src="/app-config.js"></script>
    <script src="/static/js/survey_runtime.js"></script>
    <script>
      const DEFAULT_FORM_CONFIG = {
        subtitle: 'Please enter your information to begin the assessment.',
        code_label: 'Participant Code',
        name_label: 'Full Name',
        school_default: 'Ambience Partner School',
        school_readonly: true,
        fields: {
          dob: { label: 'Date of Birth', visible: true, required: true },
          grade: { label: 'Grade', visible: true, required: true },
          school: { label: 'School', visible: true, required: true },
        }
      };

      function setMsg(message) {
        document.getElementById('msg').textContent = message || '';
      }

      function normalizeFormConfig(raw) {
        const config = raw && typeof raw === 'object' ? raw : {};
        const fields = config.fields && typeof config.fields === 'object' ? config.fields : {};
        return {
          subtitle: config.subtitle || DEFAULT_FORM_CONFIG.subtitle,
          code_label: config.code_label || DEFAULT_FORM_CONFIG.code_label,
          name_label: config.name_label || DEFAULT_FORM_CONFIG.name_label,
          school_default: config.school_default || DEFAULT_FORM_CONFIG.school_default,
          school_readonly: config.school_readonly !== undefined ? !!config.school_readonly : DEFAULT_FORM_CONFIG.school_readonly,
          fields: {
            dob: {
              label: (fields.dob && fields.dob.label) || DEFAULT_FORM_CONFIG.fields.dob.label,
              visible: fields.dob && fields.dob.visible !== undefined ? !!fields.dob.visible : DEFAULT_FORM_CONFIG.fields.dob.visible,
              required: fields.dob && fields.dob.required !== undefined ? !!fields.dob.required : DEFAULT_FORM_CONFIG.fields.dob.required,
            },
            grade: {
              label: (fields.grade && fields.grade.label) || DEFAULT_FORM_CONFIG.fields.grade.label,
              visible: fields.grade && fields.grade.visible !== undefined ? !!fields.grade.visible : DEFAULT_FORM_CONFIG.fields.grade.visible,
              required: fields.grade && fields.grade.required !== undefined ? !!fields.grade.required : DEFAULT_FORM_CONFIG.fields.grade.required,
            },
            school: {
              label: (fields.school && fields.school.label) || DEFAULT_FORM_CONFIG.fields.school.label,
              visible: fields.school && fields.school.visible !== undefined ? !!fields.school.visible : DEFAULT_FORM_CONFIG.fields.school.visible,
              required: fields.school && fields.school.required !== undefined ? !!fields.school.required : DEFAULT_FORM_CONFIG.fields.school.required,
            },
          },
        };
      }

      function applyFieldConfig(fieldName, cfg) {
        const wrap = document.getElementById(`field-${fieldName}-wrap`);
        const label = document.getElementById(`label-${fieldName}`);
        const requiredEl = document.getElementById(`required-${fieldName}`);
        const input = document.getElementById(fieldName === 'name' ? 'full_name' : fieldName);

        if (!wrap || !label || !requiredEl || !input) return;

        if (cfg.visible === false) {
          wrap.style.display = 'none';
          input.required = false;
          return;
        }

        wrap.style.display = '';
        label.childNodes[0].nodeValue = `${cfg.label} `;
        input.required = !!cfg.required;
        requiredEl.style.display = cfg.required ? 'inline' : 'none';
      }

      function applyFormConfig(config) {
        document.getElementById('surveyName').textContent = config.subtitle || DEFAULT_FORM_CONFIG.subtitle;

        document.getElementById('label-code').childNodes[0].nodeValue = `${config.code_label || 'Participant Code'} `;
        document.getElementById('label-name').childNodes[0].nodeValue = `${config.name_label || 'Full Name'} `;

        applyFieldConfig('dob', config.fields.dob);
        applyFieldConfig('grade', config.fields.grade);
        applyFieldConfig('school', config.fields.school);

        const schoolInput = document.getElementById('school');
        schoolInput.value = config.school_default || '';
        schoolInput.readOnly = !!config.school_readonly;
      }

      function getConfigFromState() {
        const state = SurveyRuntime.getState();
        const raw = state && state.survey ? state.survey.participant_form_config : null;
        return normalizeFormConfig(raw);
      }

      function validateVisibleRequiredFields(formConfig, payload) {
        if (!payload.code || !payload.name) {
          throw new Error('Please fill all required fields.');
        }

        const f = formConfig.fields;
        if (f.dob.visible && f.dob.required && !payload.dob) {
          throw new Error(`${f.dob.label || 'Date of Birth'} is required.`);
        }
        if (f.grade.visible && f.grade.required && !payload.grade) {
          throw new Error(`${f.grade.label || 'Grade'} is required.`);
        }
        if (f.school.visible && f.school.required && !payload.school) {
          throw new Error(`${f.school.label || 'School'} is required.`);
        }
      }

      async function ensureSurvey() {
        const state = SurveyRuntime.getState();
        const token = SurveyRuntime.getTokenFromUrl() || state.token;
        if (!token) {
          window.location.href = '/survey/consent';
          return null;
        }
        if (state.survey && state.token === token) {
          return state.survey;
        }
        return SurveyRuntime.loadSurveyByToken(token);
      }

      async function submitDetails(event) {
        event.preventDefault();
        setMsg('');
        try {
          const state = SurveyRuntime.getState();
          const survey = state.survey;
          if (!survey || !survey.id) throw new Error('Survey khong hop le.');

          const formConfig = getConfigFromState();
          const dobVisible = formConfig.fields.dob.visible;
          const gradeVisible = formConfig.fields.grade.visible;
          const schoolVisible = formConfig.fields.school.visible;
          const dobRaw = document.getElementById('dob').value;
          const gradeRaw = document.getElementById('grade').value;
          const schoolRaw = document.getElementById('school').value.trim();

          const payload = {
            survey_id: survey.id,
            code: document.getElementById('code').value.trim(),
            name: document.getElementById('full_name').value.trim(),
            school: schoolVisible && schoolRaw ? schoolRaw : null,
            grade: gradeVisible && gradeRaw ? gradeRaw : null,
            dob: dobVisible && dobRaw ? dobRaw : null,
            consent: state.consent || null,
          };

          validateVisibleRequiredFields(formConfig, payload);

          const result = await SurveyRuntime.submitParticipant(payload);
          SurveyRuntime.patchState({
            participant: result.participant,
            attempt: result.attempt,
            currentStepIndex: 0,
            currentIndex: 0,
            answers: {},
          });

          window.location.href = `/survey/instructions?token=${encodeURIComponent(state.token)}`;
        } catch (e) {
          setMsg(e.message || 'Failed to submit details.');
        }
      }

      ensureSurvey()
        .then((survey) => {
          if (!survey) return;
          const formConfig = getConfigFromState();
          applyFormConfig(formConfig);
        })
        .catch((e) => setMsg(e.message || 'Failed to load survey.'));

      document.getElementById('details-form').addEventListener('submit', submitDetails);
    </script>
</body>
</html>
