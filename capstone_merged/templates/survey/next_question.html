<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cognitive Task</title>
    <link rel="stylesheet" href="/static/css/spatial.css">
</head>
<body>
    <header>
        <div class="header-left" style="width: 180px;"></div>
        <h2 class="header-title" id="surveyName">Student semester 1 quiz</h2>
        <div style="width: 180px; text-align: right;"></div>
    </header>

    <div class="main-container">
        <div class="task-title" id="taskTitle">Task</div>
        <div class="task-subtitle" id="taskSubtitle" style="color: #2d6cdf; font-weight: bold;"></div>

        <div id="instructionView" style="display:none; font-size:18px; line-height:1.6; color:#333;"></div>

        <div id="arrowView" style="display:none;">
            <div style="text-align: center; font-size: 18px; margin: 20px 0 30px 0; color: #111;" id="arrowPrompt"></div>
            <div class="spatial-task-layout">
                <div class="spatial-map-column">
                    <img id="arrowQuestionImage" src="/static/images/Digital Perspective Taking Measure.png" alt="Question Map" class="massive-spatial-image">
                </div>
                <div class="spatial-interaction-column">
                    <div class="interaction-circle-wrapper">
                        <div id="lbl-facing" class="custom-label label-top"></div>
                        <div id="lbl-standing" class="custom-label label-center"></div>
                        <canvas id="task-canvas" width="250" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="spatial-instructions-bottom">press on the circle to draw a line of an arrow to complete</div>
        </div>

        <div id="mcqView" style="display:none;">
            <div class="mr-container" id="mcqContainer">
                <div class="mr-target" id="mcqTarget" style="display:none;">
                    <div class="mr-img-box" style="cursor: default; border-color: #ccc; background: white;">
                        <img id="mcqTargetImg" src="" alt="Target image">
                        <div style="margin-top: 10px; font-weight: bold; text-align: center;">Target</div>
                    </div>
                </div>
                <div class="mr-options" id="mcqOptions" style="flex-wrap: wrap;"></div>
            </div>
            <div id="mcqHint" style="text-align: center; margin-top: 18px; color:#666;"></div>
        </div>

        <div class="nav-buttons-container">
            <div class="nav-left">
                <button type="button" id="btnPrev" class="btn-nav btn-back">Back</button>
            </div>
            <div class="nav-right">
                <button type="button" id="btnNext" class="btn-nav btn-next">Next</button>
            </div>
        </div>

        <div id="msg" style="margin-top: 10px; color: #b42318; font-size: 14px;"></div>
    </div>

    <script src="/app-config.js"></script>
    <script src="/static/js/survey_runtime.js"></script>
    <script>
        let isNavigating = false;
        let selectedOptionId = null;
        let selectedOptionIds = new Set();
        let currentArrowAngle = null;

        function setMsg(message) {
            document.getElementById('msg').textContent = message || '';
        }

        function getCtx() {
            const state = SurveyRuntime.getState();
            if (!state || !state.survey || !state.attempt || !state.token) {
                window.location.href = '/survey/consent';
                return null;
            }

            const questions = Array.isArray(state.survey.questions) ? state.survey.questions : [];
            const flowSteps = Array.isArray(state.flowSteps) ? state.flowSteps : [];
            const idx = Number(typeof state.currentStepIndex === 'number' ? state.currentStepIndex : state.currentIndex || 0);

            if (!flowSteps.length) {
                window.location.href = `/survey/submitted?token=${encodeURIComponent(state.token)}`;
                return null;
            }

            return {
                state,
                questions,
                flowSteps,
                currentStepIndex: idx,
                step: flowSteps[idx],
            };
        }

        function showView(type) {
            document.getElementById('instructionView').style.display = type === 'instruction' ? 'block' : 'none';
            document.getElementById('arrowView').style.display = type === 'arrow' ? 'block' : 'none';
            document.getElementById('mcqView').style.display = type === 'mcq' ? 'block' : 'none';
        }

        function getMrInstructionSlides() {
            return [
                `
                    <div style="font-size: 18px; line-height: 1.6; color: #333;">
                        Please look at these five figures. These are all pictures of the same object shown from different angles. Try to imagine moving the object as you look from one drawing to the next one.
                    </div>
                    <img src="/static/images/Mental Rotation Instruction 1.png" alt="Mental Rotation Instruction 1" style="max-width: 100%; margin: 16px auto; display: block;">
                    <div style="font-size: 18px; line-height: 1.6; color: #333; margin-top: 10px;">
                        Below are two drawings of a new figure that are different from the one shown in the first 5 drawings. They are of a different object and cannot be rotated to match the first 5 drawings.
                    </div>
                    <img src="/static/images/Mental Rotation Instruction 2.png" alt="Mental Rotation Instruction 2" style="max-width: 100%; margin: 16px auto; display: block;">
                `,
                `
                    <div style="font-size: 18px; line-height: 1.6; color: #333;">
                        Now look at this object. Two of the four drawings on the right are the same as the object on the left. Can you find those two?
                    </div>
                    <img src="/static/images/Mental Rotation Instruction 3.png" alt="Mental Rotation Instruction 3" style="max-width: 100%; margin: 16px auto; display: block;">
                    <div style="font-size: 18px; line-height: 1.6; color: #333; margin-top: 10px;">
                        If you marked the first and third drawings, you made the correct choice.<br>
                        Here is another problem. Again, the target object is shown on the left.
                    </div>
                    <img src="/static/images/Mental Rotation Instruction 4.png" alt="Mental Rotation Instruction 4" style="max-width: 100%; margin: 16px auto; display: block;">
                `,
                `
                    <div style="font-size: 18px; line-height: 1.6; color: #333; margin-bottom: 10px;">
                        Here are two more examples to review:
                    </div>
                    <img src="/static/images/Mental Rotation Instruction 5.png" alt="Mental Rotation Instruction 5" style="max-width: 100%; margin: 12px auto; display: block;">
                    <img src="/static/images/Mental Rotation Instruction 6.png" alt="Mental Rotation Instruction 6" style="max-width: 100%; margin: 12px auto; display: block;">
                    <div style="font-size: 18px; line-height: 1.6; color: #333; margin-top: 8px;">
                        <strong>Correct choices:</strong><br>
                        Top row: first and fourth<br>
                        Bottom row: first and third
                    </div>
                `,
                `
                    <div style="font-size: 18px; line-height: 1.6; color: #333;">
                        When you do the next ones, please remember that for each problem set there are two and only two figures that match the figure on the left. You will only be given a point if you mark off both correct matching figures; marking only one of these will result in no marks.
                    </div>
                    <div style="font-size: 18px; line-height: 1.6; color: #333; margin-top: 14px;">
                        You will have 10 minutes to work on this task. Try to answer every question. If you cannot answer a question, try the next one. If there is time, go back to the question you skipped.
                    </div>
                `,
            ];
        }

        function renderInstruction(step, hasNextQuestions) {
            const isArrow = step.questionType === 'arrow';
            document.getElementById('taskTitle').textContent = isArrow
                ? 'Perspective-taking and Spatial Orientation'
                : 'Mental Rotation Task';
            document.getElementById('taskSubtitle').textContent = isArrow
                ? 'Try doing this sample question before taking the quiz'
                : 'Instructions';

            if (isArrow) {
                document.getElementById('taskSubtitle').style.color = '#d97706';
                document.getElementById('arrowPrompt').innerHTML = 'Imagine you are standing at the <strong>flower</strong> and facing the <strong>tree</strong>. Point to the <strong>cat</strong>.';
                document.getElementById('lbl-standing').textContent = 'Flower';
                document.getElementById('lbl-facing').textContent = 'Tree';
                document.getElementById('arrowQuestionImage').src = '/static/images/Digital Perspective Taking Measure.png';
                setupArrowCanvas(null);
                document.getElementById('btnPrev').disabled = true;
                document.getElementById('btnNext').textContent = hasNextQuestions ? 'Do Quiz' : 'Next';
                showView('arrow');
                return;
            }

            document.getElementById('taskSubtitle').style.color = '#2d6cdf';
            const slides = getMrInstructionSlides();
            const state = SurveyRuntime.getState();
            const savedSlide = Number(state.mrInstructionSlide || 0);
            const slideIndex = Number.isFinite(savedSlide) ? Math.max(0, Math.min(savedSlide, slides.length - 1)) : 0;

            if (slideIndex !== savedSlide) {
                SurveyRuntime.patchState({ mrInstructionSlide: slideIndex });
            }

            document.getElementById('instructionView').innerHTML = slides[slideIndex];
            document.getElementById('btnPrev').disabled = slideIndex === 0;
            document.getElementById('btnNext').textContent = slideIndex < slides.length - 1 ? 'Next' : 'Start Quiz';
            showView('instruction');
        }

        function setupArrowCanvas(savedAngle) {
            const canvas = document.getElementById('task-canvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 123;
            let endpoint = null;

            function drawArrow(toX, toY, color) {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(toX, toY);
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();

                const angle = Math.atan2(toY - centerY, toX - centerX);
                const headLength = 15;
                ctx.beginPath();
                ctx.moveTo(toX, toY);
                ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 6), toY - headLength * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 6), toY - headLength * Math.sin(angle + Math.PI / 6));
                ctx.lineTo(toX, toY);
                ctx.fillStyle = color;
                ctx.fill();
            }

            function renderCanvas() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawArrow(centerX, centerY - radius, '#999');
                if (endpoint) {
                    drawArrow(endpoint.x, endpoint.y, '#c59b48');
                }
            }

            canvas.onclick = (event) => {
                const rect = canvas.getBoundingClientRect();
                const dx = event.clientX - rect.left - centerX;
                const dy = event.clientY - rect.top - centerY;
                const angle = Math.atan2(dy, dx);

                endpoint = {
                    x: Math.round(centerX + radius * Math.cos(angle)),
                    y: Math.round(centerY + radius * Math.sin(angle)),
                };

                const px = -1 * dx;
                const py = dy;
                let angleDeg = Math.round((Math.atan2(px, py) * (180 / Math.PI)) + 180) % 360;
                if (angleDeg > 180) angleDeg = 360 - angleDeg;
                currentArrowAngle = angleDeg;
                renderCanvas();
            };

            if (typeof savedAngle === 'number' && Number.isFinite(savedAngle)) {
                const rad = ((180 - savedAngle) * Math.PI) / 180;
                endpoint = {
                    x: Math.round(centerX + radius * Math.sin(rad)),
                    y: Math.round(centerY + radius * Math.cos(rad)),
                };
                currentArrowAngle = savedAngle;
            } else {
                currentArrowAngle = null;
            }

            renderCanvas();
        }

        function renderMCQ(q, savedAnswer) {
            const options = Array.isArray(q.options)
                ? q.options.slice().sort((a, b) => (a.order_index || 0) - (b.order_index || 0))
                : [];

            selectedOptionId = savedAnswer && savedAnswer.selected_option_id ? savedAnswer.selected_option_id : null;
            selectedOptionIds = new Set(savedAnswer && Array.isArray(savedAnswer.selected_option_ids) ? savedAnswer.selected_option_ids : []);

            const allowMultiple = !!q.allow_multiple_selection;
            document.getElementById('mcqHint').textContent = allowMultiple ? 'Choose one or more answers' : 'Choose one answer';

            if (q.question_image) {
                document.getElementById('mcqTarget').style.display = 'block';
                document.getElementById('mcqTargetImg').src = q.question_image;
            } else {
                document.getElementById('mcqTarget').style.display = 'none';
                document.getElementById('mcqTargetImg').src = '';
            }

            const html = options.map((opt) => {
                const active = allowMultiple
                    ? selectedOptionIds.has(opt.id)
                    : selectedOptionId === opt.id;
                return `
                    <div class="mr-option-wrapper">
                        <div class="mr-img-box ${active ? 'selected' : ''}" onclick="toggleOption('${opt.id}')">
                            <img src="${opt.image_url}" alt="Option image">
                        </div>
                        ${allowMultiple ? `<input type="checkbox" class="mr-checkbox" ${active ? 'checked' : ''} onclick="toggleOption('${opt.id}')">` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('mcqOptions').innerHTML = html;
        }

        function renderQuestion(q, position, total, savedAnswer) {
            const requiredText = q.is_required ? 'Required' : 'Optional';
            document.getElementById('taskSubtitle').textContent = `Question ${position}/${total} • ${requiredText}`;
            document.getElementById('taskTitle').textContent = q.type === 'arrow'
                ? 'Perspective-taking and Spatial Orientation'
                : 'Mental Rotation Task';

            if (q.type === 'arrow') {
                const standing = (q.config && q.config.standing_position) || 'Standing';
                const facing = (q.config && q.config.looking_direction) || 'Facing';
                document.getElementById('lbl-standing').textContent = standing;
                document.getElementById('lbl-facing').textContent = facing;
                document.getElementById('arrowPrompt').innerHTML = `Imagine you are standing at the <strong>${standing}</strong> and facing the <strong>${facing}</strong>. Point to the target direction.`;
                document.getElementById('arrowQuestionImage').src = q.question_image || '/static/images/Digital Perspective Taking Measure.png';
                setupArrowCanvas(savedAnswer && typeof savedAnswer.user_angle === 'number' ? savedAnswer.user_angle : null);
                showView('arrow');
            } else {
                renderMCQ(q, savedAnswer);
                showView('mcq');
            }
        }

        function render() {
            setMsg('');
            const ctx = getCtx();
            if (!ctx) return;

            const { state, questions, flowSteps, currentStepIndex, step } = ctx;
            document.getElementById('surveyName').textContent = state.survey.name || 'Student semester 1 quiz';
            document.getElementById('btnPrev').disabled = currentStepIndex <= 0;

            if (!step) {
                window.location.href = `/survey/submitted?token=${encodeURIComponent(state.token)}`;
                return;
            }

            const hasNextQuestion = flowSteps.slice(currentStepIndex + 1).some((x) => x.kind === 'question');
            document.getElementById('btnNext').textContent = hasNextQuestion ? 'Next' : 'Submit';

            if (step.kind === 'instruction') {
                renderInstruction(step, hasNextQuestion);
                return;
            }

            const q = questions.find((x) => x.id === step.questionId);
            if (!q) {
                setMsg('Question not found.');
                return;
            }

            const questionSteps = flowSteps.filter((x) => x.kind === 'question');
            const pos = questionSteps.findIndex((x) => x.questionId === q.id) + 1;
            const savedAnswer = (state.answers || {})[q.id] || null;
            renderQuestion(q, pos, questionSteps.length, savedAnswer);
        }

        function toggleOption(optionId) {
            const ctx = getCtx();
            if (!ctx || !ctx.step || ctx.step.kind !== 'question') return;
            const q = ctx.questions.find((x) => x.id === ctx.step.questionId);
            if (!q || q.type !== 'mcq') return;

            if (q.allow_multiple_selection) {
                if (selectedOptionIds.has(optionId)) selectedOptionIds.delete(optionId);
                else selectedOptionIds.add(optionId);
            } else {
                selectedOptionId = optionId;
            }

            const nextAnswers = { ...(ctx.state.answers || {}) };
            if (q.allow_multiple_selection) {
                nextAnswers[q.id] = {
                    question_id: q.id,
                    selected_option_ids: Array.from(selectedOptionIds),
                };
            } else {
                nextAnswers[q.id] = {
                    question_id: q.id,
                    selected_option_id: selectedOptionId,
                };
            }
            SurveyRuntime.patchState({ answers: nextAnswers });

            render();
        }

        async function onNext() {
            setMsg('');
            const ctx = getCtx();
            if (!ctx) return;
            const { state, flowSteps, currentStepIndex, step, questions } = ctx;

            if (!step) return;

            if (step.kind === 'instruction') {
                if (step.questionType !== 'arrow') {
                    const slides = getMrInstructionSlides();
                    const currentSlide = Number(state.mrInstructionSlide || 0);
                    if (currentSlide < slides.length - 1) {
                        SurveyRuntime.patchState({ mrInstructionSlide: currentSlide + 1 });
                        render();
                        return;
                    }
                }

                SurveyRuntime.patchState({ mrInstructionSlide: 0, currentStepIndex: currentStepIndex + 1, currentIndex: currentStepIndex + 1 });
                render();
                return;
            }

            const q = questions.find((x) => x.id === step.questionId);
            if (!q) {
                setMsg('Question not found.');
                return;
            }

            let payload = { question_id: q.id };
            if (q.type === 'mcq') {
                if (q.allow_multiple_selection) {
                    const ids = Array.from(selectedOptionIds);
                    if (ids.length > 0) payload = { question_id: q.id, selected_option_ids: ids };
                    else if (q.is_required) throw new Error('Please choose at least one option.');
                } else {
                    if (selectedOptionId) payload = { question_id: q.id, selected_option_id: selectedOptionId };
                    else if (q.is_required) throw new Error('Please choose an option.');
                }
            } else if (q.type === 'arrow') {
                if (Number.isFinite(currentArrowAngle)) payload = { question_id: q.id, user_angle: currentArrowAngle };
                else if (q.is_required) throw new Error('Please draw an arrow direction.');
            }

            try {
                await SurveyRuntime.submitOneAnswer(state.attempt.id, payload);

                const nextAnswers = { ...(state.answers || {}) };
                nextAnswers[q.id] = payload;

                const hasNextQuestion = flowSteps.slice(currentStepIndex + 1).some((x) => x.kind === 'question');
                if (!hasNextQuestion) {
                    await SurveyRuntime.doneAttempt(state.attempt.id);
                    SurveyRuntime.patchState({ answers: nextAnswers, currentStepIndex: flowSteps.length, currentIndex: flowSteps.length });
                    isNavigating = true;
                    window.location.href = `/survey/submitted?token=${encodeURIComponent(state.token)}`;
                    return;
                }

                SurveyRuntime.patchState({ answers: nextAnswers, currentStepIndex: currentStepIndex + 1, currentIndex: currentStepIndex + 1 });
                render();
            } catch (e) {
                setMsg(e.message || 'Failed to submit answer.');
            }
        }

        function onPrev() {
            const ctx = getCtx();
            if (!ctx) return;

            const { state, currentStepIndex, step } = ctx;

            if (step && step.kind === 'instruction' && step.questionType !== 'arrow') {
                const currentSlide = Number(state.mrInstructionSlide || 0);
                if (currentSlide > 0) {
                    SurveyRuntime.patchState({ mrInstructionSlide: currentSlide - 1 });
                    render();
                    return;
                }
            }

            if (currentStepIndex <= 0) return;
            SurveyRuntime.patchState({ currentStepIndex: currentStepIndex - 1, currentIndex: currentStepIndex - 1 });
            render();
        }

        window.addEventListener('beforeunload', function (e) {
            if (!isNavigating) {
                e.preventDefault();
                e.returnValue = 'Are you sure you want to close the survey? Your current progress is saved.';
            }
        });

        document.getElementById('btnNext').addEventListener('click', onNext);
        document.getElementById('btnPrev').addEventListener('click', onPrev);
        window.toggleOption = toggleOption;

        render();
    </script>
</body>
</html>
