<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Distributions</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --text-1: #111827;
      --text-2: #6b7280;
      --accent: #1f2937;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 10px;
    }
    .logo { font-weight: 800; letter-spacing: 0.02em; }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .btn, .link-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn.primary, .link-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .tabs-wrap {
      height: 50px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .tabs { display: flex; align-items: center; gap: 14px; }
    .tab {
      text-decoration: none;
      color: var(--text-2);
      font-size: 13px;
      padding: 14px 4px 12px;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--text-1); border-bottom-color: var(--accent); font-weight: 600; }
    .content { padding: 16px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-width: 860px;
    }
    .title { font-size: 18px; margin: 0 0 6px; }
    .sub { color: var(--text-2); font-size: 13px; margin-bottom: 16px; }
    .field-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 600; }
    .link-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .link-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      background: #fff;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .msg { margin-top: 10px; font-size: 13px; min-height: 18px; }
    .ok { color: #065f46; }
    .err { color: #b91c1c; }
    @media (max-width: 760px) {
      .link-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">CASE</div>
    <div class="top-actions">
      <a class="link-btn" href="admin_mysurveys.html">Back to Survey</a>
      <button class="btn" id="btnLogout">Logout</button>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs">
      <a class="tab" id="tabSurvey" href="admin_surveybuilder.html">Survey</a>
      <a class="tab active" href="#">Distributions</a>
      <a class="tab" id="tabData" href="admin_dataanalysis.html">Data & Analysis</a>
      <a class="tab" id="tabResults" href="admin_results.html">Results</a>
    </div>
  </div>

  <main class="content">
    <section class="card">
      <h1 class="title">Distribution Link</h1>
      <div class="sub">Copy survey link for sharing, or renew token to invalidate old link.</div>

      <div class="field-label">Survey Link</div>
      <div class="link-row">
        <input id="surveyLink" class="link-input" type="text" readonly value="" />
        <button id="btnCopy" class="btn">Copy Survey Link</button>
      </div>

      <div class="actions">
        <button id="btnRenew" class="btn primary">Renew Link</button>
      </div>

      <div id="msg" class="msg"></div>
    </section>
  </main>

  <script src="/app-config.js?v=2"></script>
  <script src="/static/js/admin_api.js?v=2"></script>
  <script>
    let surveyId = null;

    function setMsg(message, isError) {
      const el = document.getElementById("msg");
      el.textContent = message || "";
      el.className = `msg ${isError ? "err" : "ok"}`;
    }

    function buildPublicLink(token) {
      return `${window.location.origin}/survey/${encodeURIComponent(token || "")}`;
    }

    function updateTabLinks(id) {
      document.getElementById("tabSurvey").href = `admin_surveybuilder.html?id=${encodeURIComponent(id)}`;
      document.getElementById("tabData").href = `admin_dataanalysis.html?id=${encodeURIComponent(id)}`;
      document.getElementById("tabResults").href = `admin_results.html?id=${encodeURIComponent(id)}`;
    }

    async function loadSurveyAndLink() {
      if (!surveyId) return;
      const survey = await AdminApi.getSurvey(surveyId);
      if (!survey || !survey.token) {
        throw new Error("Survey token not found.");
      }
      document.getElementById("surveyLink").value = buildPublicLink(survey.token);
      updateTabLinks(surveyId);
    }

    async function onCopy() {
      const value = document.getElementById("surveyLink").value;
      if (!value) {
        setMsg("Survey link is empty.", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(value);
        setMsg("Copied survey link.", false);
      } catch (_) {
        setMsg("Cannot copy link.", true);
      }
    }

    async function onRenew() {
      if (!surveyId) return;
      try {
        setMsg("", false);
        const renewed = await AdminApi.regenerateToken(surveyId);
        document.getElementById("surveyLink").value = buildPublicLink(renewed.token);
        setMsg("Survey link renewed.", false);
      } catch (e) {
        setMsg(e.message || "Renew link failed.", true);
      }
    }

    async function init() {
      const me = await AdminApi.ensureAuthenticated({ requireAdmin: true });
      if (!me) return;

      const params = new URLSearchParams(window.location.search);
      surveyId = params.get("id");
      if (!surveyId) {
        setMsg("Missing survey id. Save survey first.", true);
        document.getElementById("btnCopy").disabled = true;
        document.getElementById("btnRenew").disabled = true;
        return;
      }

      try {
        await loadSurveyAndLink();
      } catch (e) {
        setMsg(e.message || "Cannot load survey link.", true);
      }
    }

    document.getElementById("btnCopy").addEventListener("click", onCopy);
    document.getElementById("btnRenew").addEventListener("click", onRenew);
    document.getElementById("btnLogout").addEventListener("click", () => AdminApi.logout());

    init();
  </script>
</body>
</html>
