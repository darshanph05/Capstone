<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --text-1: #111827;
      --text-2: #6b7280;
      --muted: #9ca3af;
      --accent: #374151;
      --sidebar-w: 230px;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      padding-top: 10px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-1); }
    .nav-item.active {
      color: var(--text-1);
      background: #f3f4f6;
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .badge {
      background: #d1d5db;
      color: #111827;
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
    }
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-weight: 800; letter-spacing: 0.02em; }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .btn, .link-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn.primary, .link-btn.primary {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .content { padding: 16px; }
    .head-title { font-size: 20px; margin: 0; }
    .head-sub { color: var(--text-2); font-size: 13px; margin-top: 4px; }
    .cards {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card-label { color: var(--text-2); font-size: 12px; }
    .card-value { font-size: 24px; font-weight: 700; margin-top: 6px; }
    .panel {
      margin-top: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
      vertical-align: top;
    }
    th { background: #fafafa; color: var(--text-2); font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 12px;
    }
    .msg { margin-top: 10px; font-size: 13px; }
    .err { color: #b91c1c; }
    .ok { color: #065f46; }
    @media (max-width: 920px) {
      .cards { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a class="nav-item active" href="admin_mysurveys.html">
      <span>Survey</span>
      <span class="badge" id="navCount">0</span>
    </a>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="logo">CASE</div>
      <div class="top-actions">
        <span id="userInfo" style="font-size:12px;color:#6b7280;">Dang tai...</span>
        <button class="btn" id="btnLogout">Logout</button>
      </div>
    </header>

    <header class="topbar">
      <div>
        <h1 class="head-title">Survey</h1>
        <div class="head-sub">Overview of your survey</div>
      </div>
    </header>

    <div class="content">
      <div id="msg" class="msg"></div>

      <div class="cards">
        <div class="card"><div class="card-label">Total Surveys</div><div class="card-value" id="total">0</div></div>
        <div class="card"><div class="card-label">Pending</div><div class="card-value" id="pending">0</div></div>
        <div class="card"><div class="card-label">Active</div><div class="card-value" id="active">0</div></div>
        <div class="card"><div class="card-label">Inactive</div><div class="card-value" id="inactive">0</div></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <strong>Recent Surveys</strong>
          <a class="link-btn primary" href="admin_surveybuilder.html">Create Survey</a>
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Start</th>
              <th>End</th>
              <th>Questions</th>
              <th>Token</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/app-config.js?v=2"></script>
  <script src="/static/js/admin_api.js?v=2"></script>
  <script>
    const msgEl = document.getElementById("msg");

    function setMsg(message, isError) {
      msgEl.textContent = message || "";
      msgEl.className = `msg ${isError ? "err" : "ok"}`;
    }

    function fmtDate(dateStr) {
      if (!dateStr) return "-";
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function renderRows(items) {
      const tbody = document.getElementById("rows");
      document.getElementById("navCount").textContent = items.length;
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6">No survey found</td></tr>`;
        return;
      }
      tbody.innerHTML = items.slice(0, 10).map((s) => `
        <tr>
          <td><a href="admin_surveybuilder.html?id=${s.id}">${s.name || "Untitled"}</a></td>
          <td><span class="status">${s.status}</span></td>
          <td>${fmtDate(s.start_time)}</td>
          <td>${fmtDate(s.end_time)}</td>
          <td>${Array.isArray(s.questions) ? s.questions.length : 0}</td>
          <td style="word-break: break-all">${s.token || "-"}</td>
        </tr>
      `).join("");
    }

    function renderStats(items) {
      document.getElementById("total").textContent = items.length;
      document.getElementById("pending").textContent = items.filter(x => x.status === "pending").length;
      document.getElementById("active").textContent = items.filter(x => x.status === "active").length;
      document.getElementById("inactive").textContent = items.filter(x => x.status === "inactive").length;
    }

    async function init() {
      const me = await AdminApi.ensureAuthenticated({ requireAdmin: true });
      if (!me) return;
      document.getElementById("userInfo").textContent = `${me.email} (${me.role.code})`;

      try {
        const surveys = await AdminApi.listSurveys();
        renderStats(surveys || []);
        renderRows(surveys || []);
      } catch (e) {
        setMsg(e.message || "Cannot load a list of surveys", true);
      }
    }

    document.getElementById("btnLogout").addEventListener("click", () => AdminApi.logout());
    init();
  </script>
</body>
</html>
