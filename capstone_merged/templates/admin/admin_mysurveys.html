<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Surveys</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --text-1: #111827;
      --text-2: #6b7280;
      --accent: #374151;
      --sidebar-w: 230px;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      padding-top: 10px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-1); }
    .nav-item.active {
      color: var(--text-1);
      background: #f3f4f6;
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .logo { font-weight: 800; }
    .btn, .link-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn.primary, .link-btn.primary {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .content { padding: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .stat-label { color: var(--text-2); font-size: 12px; }
    .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }
    input, select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: #fff;
      min-width: 160px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
      vertical-align: top;
    }
    th { background: #fafafa; color: var(--text-2); font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 12px;
    }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .mini {
      font-size: 12px;
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .danger { border-color: #fca5a5; color: #b91c1c; background: #fff1f2; }
    .msg { font-size: 13px; margin-bottom: 10px; }
    .err { color: #b91c1c; }
    .ok { color: #065f46; }
    @media (max-width: 760px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a class="nav-item active" href="admin_mysurveys.html">Survey</a>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="logo">CASE</div>
      <div>
        <button class="btn" id="btnLogout">Logout</button>
      </div>
    </header>

    <header class="topbar">
      <strong>Survey</strong>
      <a class="link-btn primary" href="admin_surveybuilder.html">Create Survey</a>
    </header>

    <div class="content">
      <div id="msg" class="msg"></div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="statActive">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Inactive</div>
          <div class="stat-value" id="statInactive">0</div>
        </div>
      </div>

      <div class="filters">
        <input id="search" placeholder="Search name..." />
        <select id="statusFilter">
          <option value="">All status</option>
          <option value="pending">pending</option>
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>
        <button class="btn" id="btnRefresh">Refresh</button>
      </div>

      <div class="panel">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Start</th>
              <th>End</th>
              <th>Questions</th>
              <th>Token</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/app-config.js?v=2"></script>
  <script src="/static/js/admin_api.js?v=2"></script>
  <script>
    let allSurveys = [];
    const msgEl = document.getElementById("msg");

    function setMsg(message, isError) {
      msgEl.textContent = message || "";
      msgEl.className = `msg ${isError ? "err" : "ok"}`;
    }

    function fmtDate(dateStr) {
      if (!dateStr) return "-";
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function applyFilter(items) {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const s = document.getElementById("statusFilter").value;
      return items.filter(item => {
        const okName = !q || (item.name || "").toLowerCase().includes(q);
        const okStatus = !s || item.status === s;
        return okName && okStatus;
      });
    }

    async function copy(text) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        setMsg("Copied", false);
      } catch (_) {
        setMsg("Could not copy", true);
      }
    }

    async function onDelete(id) {
      if (!confirm("Delete this survey")) return;
      try {
        await AdminApi.deleteSurvey(id);
        setMsg("Deleted", false);
        await load();
      } catch (e) {
        setMsg(e.message || "Deletion failed", true);
      }
    }

    function onUpdate(id) {
      window.location.href = `admin_surveybuilder.html?id=${id}`;
    }

    function render() {
      const rows = document.getElementById("rows");
      const items = applyFilter(allSurveys);
      if (!items.length) {
        rows.innerHTML = `<tr><td colspan="7">No data available</td></tr>`;
        return;
      }

      rows.innerHTML = items.map(s => `
        <tr>
          <td><a href="admin_surveybuilder.html?id=${s.id}">${s.name || "Untitled"}</a></td>
          <td><span class="status">${s.status}</span></td>
          <td>${fmtDate(s.start_time)}</td>
          <td>${fmtDate(s.end_time)}</td>
          <td>${Array.isArray(s.questions) ? s.questions.length : 0}</td>
          <td style="word-break: break-all; max-width: 220px;">${s.token || "-"}</td>
          <td>
            <div class="row-actions">
              <button class="mini" title="Copy Public URL" onclick="copy('${window.location.origin}/survey/${s.token || ""}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L10 5"/><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 1 0 7.07 7.07L14 19"/></svg>
              </button>
              <button class="mini" title="Update Survey" onclick="onUpdate('${s.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>
              </button>
              <button class="mini danger" title="Delete Survey" onclick="onDelete('${s.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function renderStats(items) {
      const list = Array.isArray(items) ? items : [];
      document.getElementById("statTotal").textContent = list.length;
      document.getElementById("statActive").textContent = list.filter((x) => x.status === "active").length;
      document.getElementById("statInactive").textContent = list.filter((x) => x.status === "inactive").length;
    }

    async function load() {
      try {
        allSurveys = await AdminApi.listSurveys();
        renderStats(allSurveys);
        render();
      } catch (e) {
        setMsg(e.message || "Tai danh sach that bai", true);
      }
    }

    async function init() {
      const me = await AdminApi.ensureAuthenticated({ requireAdmin: true });
      if (!me) return;
      await load();
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("statusFilter").addEventListener("change", render);
    document.getElementById("btnRefresh").addEventListener("click", load);
    document.getElementById("btnLogout").addEventListener("click", () => AdminApi.logout());

    window.copy = copy;
    window.onDelete = onDelete;
    window.onUpdate = onUpdate;

    init();
  </script>
</body>
</html>
